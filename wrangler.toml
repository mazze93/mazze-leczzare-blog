$schema = "./node_modules/wrangler/config-schema.json"
name = "mazze-leczzare-blog"
compatibility_date = "2026-03-07"
pages_build_output_dir = "dist"

[vars]
CONTACT_FROM_EMAIL = "contact@mazzeleczzare.com"
CONTACT_SUBJECT_PREFIX = "Mazze Contact"

# ── Required secrets ──────────────────────────────────────────────────────────
# These must be set via `wrangler secret put <NAME>` or the Cloudflare dashboard.
# They are never stored here. See .dev.vars.example for local dev setup.
#
#   ADMIN_PASSWORD          — plain-text password checked by /api/login
#   JWT_SECRET              — signs/verifies admin session JWTs (≥32 random chars)
#   CONTACT_TO_EMAIL        — recipient address for contact form submissions
#
# ── Optional secrets ──────────────────────────────────────────────────────────
#   CONTACT_WEBHOOK_URL         — POST validated contact payloads here instead of email
#   CONTACT_WEBHOOK_AUTH_HEADER — Authorization header value for the webhook receiver
#
# ── Service bindings ──────────────────────────────────────────────────────────
# Both rate limiters require [[unsafe.bindings]] entries in this file AND a
# matching binding created in the Cloudflare dashboard (Pages → Settings →
# Functions → KV namespace / Rate limiting bindings).
#
# LOGIN_RATE_LIMITER — 5 req / 60 s per fingerprint on /api/login.
#   Without it, login attempts are unlimited (brute-force risk). The endpoint
#   logs a warning on every request when the binding is absent.
#
# [[unsafe.bindings]]
# name       = "LOGIN_RATE_LIMITER"
# type       = "ratelimit"
# namespace_id = "<id-from-cloudflare-dashboard>"
# [unsafe.bindings.simple]
# limit  = 5
# period = 60
#
# SHARE_EVENT_RATE_LIMITER — 20 req / 60 s per fingerprint on /api/share-event.
#   Without it the endpoint logs a warning and returns 503 for share events.
#
# [[unsafe.bindings]]
# name       = "SHARE_EVENT_RATE_LIMITER"
# type       = "ratelimit"
# namespace_id = "<id-from-cloudflare-dashboard>"
# [unsafe.bindings.simple]
# limit  = 20
# period = 60
